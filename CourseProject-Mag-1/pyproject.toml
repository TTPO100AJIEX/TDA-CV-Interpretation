[tool.ruff]
target-version = "py313"
line-length = 120
exclude = ["*.ipynb"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "cr-lf"

[tool.ruff.lint]
ignore = ["E402"]

[tool.ruff.lint.isort]
force-single-line = true
relative-imports-order = "closest-to-furthest"
force-sort-within-sections = true
case-sensitive = false
order-by-type = false
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]
no-lines-before = [
    "local-folder",
]
